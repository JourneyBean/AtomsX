worker_processes auto;
error_log /usr/local/openresty/nginx/logs/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" '
                    'workspace=$workspace_id';

    access_log /usr/local/openresty/nginx/logs/access.log main;

    sendfile        on;
    keepalive_timeout  65;

    # Lua shared dict for caching workspace->container mappings
    lua_shared_dict workspace_cache 10m;

    # Lua package path
    lua_package_path "/usr/local/openresty/lua/?.lua;;";

    # Upstream definitions
    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:5173;
    }

    # Main server block
    server {
        listen 80;
        # Use catch-all instead of hardcoded localhost
        # In production, this will be overridden by actual domain
        server_name _;

        # API requests go to Django backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support for streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
        }

        # Frontend requests go to Vite dev server
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Health check endpoint
        location /health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # Preview server block - handles *.preview.local
    server {
        listen 80;
        server_name ~^(?<workspace_id>[a-f0-9\-]+)\.preview\.local$;

        # Set workspace_id variable for logging
        set $workspace_id $workspace_id;

        # Pre-declare container_host for Lua to set dynamically
        set $container_host "";

        # Authentication check via Lua
        access_by_lua_block {
            local auth = require "auth_check"
            auth.check(ngx.var.workspace_id)
        }

        # Proxy to workspace container
        location / {
            # Dynamic upstream resolution based on workspace_id
            proxy_pass http://$container_host;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # HMR / WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # SSE support for HMR
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;

            # Error handling
            proxy_intercept_errors on;
            error_page 502 503 504 = @workspace_error;
        }

        # Error handling for workspace not available
        location @workspace_error {
            default_type text/html;
            return 503 '<html><body><h1>Workspace Unavailable</h1><p>The workspace is not currently running. Please try again later.</p></body></html>';
        }
    }
}