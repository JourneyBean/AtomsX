[program:workspace-client]
command=uv run python -m workspace_client.main
directory=/opt/workspace-client
autostart=true
autorestart=true
startsecs=5
stopwaitsecs=10
stdout_logfile=/home/user/logs/workspace-client.log
stderr_logfile=/home/user/logs/workspace-client-error.log

[program:preview-server]
command=/opt/workspace-client/scripts/start_preview.sh
directory=/home/user/workspace
autostart=true
autorestart=true
startsecs=3
stopwaitsecs=10
stdout_logfile=/home/user/logs/preview-server.log
stderr_logfile=/home/user/logs/preview-server-error.log