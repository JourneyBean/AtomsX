schema: spec-driven

context: |
  产品背景：
    我们正在构建一个可视化 Coding 平台。
    界面分为左右两栏：
    - 左侧：对话式 AI 工作区
    - 右侧：实时预览 / 效果展示页面
    平台同时支持发布 / 部署能力。
    技术栈：
      前端：Vue 3 + TypeScript + Vite
      主后端 / 控制面：Django 5.2 LTS + Django REST Framework
      实时能力：先用 SSE；需要双向时再上 Django Channels/WebSocket
      任务队列：Redis + Celery
      数据库：PostgreSQL
      边缘网关：OpenResty
      Workspace：Docker 容器隔离运行
      构建 / 部署：单独的 builder / deployer 服务，不塞进 Django 进程里
      Agent框架：Claude Agent SDK

  核心对象：
    - Project：项目实体
    - Workspace：工作空间。通常在创建项目或进入开发阶段时创建，作为隔离的开发沙箱
    - Session：绑定到 Workspace 的用户-AI 会话
    - Preview：开发态实时预览入口
    - Deployment：从 Workspace 源码构建出的已发布运行版本
    - Route Manifest：路由与可见性配置，用于描述某个入口应转发到哪里，以及是否公开

  架构原则：
    - Workspace 是开发沙箱，不是基础设施控制平面
    - 开发态预览链路与发布态访问链路必须分离
    - Agent 运行时、预览路由、镜像构建、部署执行必须解耦
    - 所有外部访问都应先进入平台控制面或边缘网关
    - 发布动作必须通过受控的平台服务触发，而不是让 Workspace 直接持有宿主机级别权限

  Workspace 约束：
    - 每个 Workspace 运行在隔离的容器化环境中
    - Workspace 内通常只承载源码、开发依赖、Agent Runtime、预览进程
    - Workspace 不应直接拥有宿主 Docker、Kubernetes Admin、或其他高权限基础设施控制能力
    - Workspace 应具备可暂停、可恢复、可销毁、可审计的生命周期
    - Conversation State 与 Filesystem State 应分开追踪

  网络与访问模型：
    - Preview 与 Published App 是两类不同入口
    - Preview 默认私有，通常要求登录态访问，域名类似 <project-uid>.preview.example.com
    - Published App 可根据策略设为公开或私有，域名类似 <project-uid>.app.example.com
    - 路由决策应来源于平台元数据/数据库，而不是硬编码在网关配置中
    - WebSocket、SSE、流式输出、热更新是一级需求

  Agent 集成要求：
    - 对话侧必须支持流式输出、增量更新、用户中断、继续执行
    - Agent 会话需要支持恢复
    - 用户审批、确认、补充输入，应作为显式工作流事件处理
    - 重要工具调用、失败原因、用户确认都应有审计记录

  构建与部署要求：
    - 镜像构建应由外部受控 Builder 执行，而不是由 Workspace 直接获取宿主控制权
    - 发布产物应尽量不可变、可版本化、可回滚
    - 部署系统要能从单机模式平滑演进到 Kubernetes，而不推翻整体模型
    - 开发态“能跑”与生产态“可治理”要明确区分

  安全要求：
    - 多租户隔离是硬要求
    - 默认最小权限
    - 任何公网暴露都必须有明确可见性策略
    - 关键动作必须可审计：对话触发、文件修改、构建、发布、路由暴露、权限变更
    - 默认优先考虑安全边界清晰，而非把能力堆进单一容器

  产品目标：
    - 快速落地一个可用 MVP
    - 在 MVP 阶段就保持职责分离，避免后续推倒重来
    - 让用户获得流畅的边聊边改边预览体验
    - 发布路径清晰、可追踪、可回滚

rules:
  proposal:
    - 明确本次变更属于哪一层：控制面、Workspace Runtime、预览网关、构建器、部署器、已发布运行时
    - 说明该变更为什么现在要做：MVP 必需、稳定性提升、安全加固、或为后续演进铺路
    - 必须包含“非目标（Non-goals）”部分，防止范围失控
    - 必须显式说明对多租户隔离、安全边界、权限模型的影响
    - 如果涉及路由或访问暴露，必须明确影响的是 Preview、Published App，还是两者都有
    - 如果涉及部署，必须写明发布方式、回滚预期、失败处理策略
    - 优先说明用户价值与平台价值，而不是只描述技术动作

  specs:
    - 所有需求必须可验证，避免模糊词汇，如“支持”“优化”“增强”“安全”
    - 将功能需求、权限需求、运维需求、安全需求分开书写
    - 同时覆盖正常路径、异常路径、边界条件
    - 引入新接口、新路由、新发布动作时，必须写明鉴权与授权规则
    - 涉及预览时，写清流式输出、WebSocket、热更新、认证、超时、断线重连行为
    - 涉及部署时，写清版本、幂等性、失败重试、回滚条件、可见性切换规则
    - 尽量使用可测试表述，必要时使用 Given / When / Then 风格
    - 需要区分用户可见状态与系统内部状态

  design:
    - 必须清晰划分控制面、Workspace Runtime、网关、Builder、Deployer 的职责边界
    - 不允许把开发态预览设计与发布态运行设计混为同一条链路
    - 优先选择不让 Workspace 直接接触宿主高权限资源的设计
    - 明确信任边界、网络流向、状态归属、故障传播路径
    - 必须说明以下状态由谁拥有：Project、Workspace、Session、Route Manifest、Build Record、Deployment Record
    - 引入第三方组件时，说明选型原因、替换路径、锁定风险
    - 优先设计可从单机演进到 Kubernetes 的方案，而不是绑定某个临时实现
    - 复杂链路建议补充时序图、状态机或数据流说明
    - 设计文档必须显式说明“哪些是临时简化，哪些是长期边界”

  tasks:
    - 任务要拆小，且每项都能独立验证
    - 控制面、Workspace Runtime、网关、Builder、Deployer 的任务应分开，不要混在一起
    - 除功能任务外，必须包含安全、审计、监控、日志、告警相关任务
    - 若采用临时简化方案，必须补充后续替换或清理任务
    - 每个任务都应有明确产出：接口、状态机、路由、构建结果、部署结果、测试、文档或告警规则
    - 优先安排短周期可落地、可观察、可回归验证的任务
    - 涉及数据或状态变更时，必须包含迁移与兼容性检查
    - 涉及用户可见能力时，必须包含验收标准